version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: partyos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: partyos
    ports:
      - "5432:5432"
    volumes:
      - partyos_postgres_data:/var/lib/postgresql/data

volumes:
  partyos_postgres_data:
